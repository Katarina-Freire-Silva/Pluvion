<!DOCTYPE html>

<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0, viewport-fit=cover">

    <title>Login • Pluvion</title>

    <link rel="stylesheet" href="../reset.css">

    <link rel="stylesheet" href="../css/paleta.css">
    <link rel="stylesheet" href="../css/tipografias.css">
    <link rel="stylesheet" href="../css/componentes.css">
    <link rel="stylesheet" href="../css/animar.css">

    <link rel="stylesheet" href="../css/telas/login.css">

</head>

<body>

<main class="login">

    <section class="login-card">

        <button
            class="voltar"
            id="voltar">

            ←

        </button>

        <h1>Login</h1>

        <form
            class="login-form"
            autocomplete="off">

            <div class="campo">

                <label for="email">

                    E-mail

                </label>

                <input
                    id="email"
                    type="email"
                    placeholder="Digite seu e-mail">

            </div>

            <div class="campo">

                <label for="senha">

                    Senha

                </label>

                <div class="campo-senha">

                    <input
                        id="senha"
                        type="password"
                        placeholder="Digite sua senha">

                    <button
                        type="button"
                        id="mostrarSenha">

                        👁

                    </button>

                </div>

            </div>

            <a
                href="#"
                class="esqueci">

                Esqueci a senha

            </a>

            <button
                class="btn btn-primario">

                ENTRAR

            </button>

            <button
                type="button"
                class="btn btn-secundario"
                id="cadastro">

                NÃO TENHO LOGIN

            </button>

        </form>

    </section>

</main>

<script src="../js/login.js"></script>

</body>

</html>
