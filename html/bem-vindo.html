<!DOCTYPE html>

<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, viewport-fit=cover">

    <title>Pluvion</title>

        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"/>

    <link rel="stylesheet" href="../reset.css">

    <link rel="stylesheet" href="../css/paleta.css">
    <link rel="stylesheet" href="../css/tipografias.css">
    <link rel="stylesheet" href="../css/componentes.css">

    <link rel="stylesheet"

    <main class="bem-vindo">

        <section class="bem-vindo-conteudo">

                id="voltar">

                <span class="material-symbols-outlined">

                    arrow_back

                </span>

            </button>

            <img
                id="imagem"
                src="../images/onboarding/on-1.svg"
                alt="Bem-vindo">

            <div class="indicadores">

                <span class="ativo"></span>
                <span></span>
                <span></span>

            </div>

            <h1 id="tituloBemVindo"></h1>

            <p id="descricaoBemVindo"></p>

            <div id="conteudoExtra"></div>

        </section>

        <section class="bem-vindo-acoes">

            <button
                class="btn btn-primario"
                id="proximo">

                CONTINUAR

            </button>

        </section>

    </main>
    <script src="../js/bem-vindo.js"></script>

</html>
