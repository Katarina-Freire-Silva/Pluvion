<!DOCTYPE html>

<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0, viewport-fit=cover">

    <title>Pluvion</title>

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"/>

    <link rel="stylesheet" href="../reset.css">

    <link rel="stylesheet" href="../css/paleta.css">
    <link rel="stylesheet" href="../css/tipografias.css">
    <link rel="stylesheet" href="../css/componentes.css">
    <link rel="stylesheet" href="../css/animar.css">

    <link rel="stylesheet" href="../css/telas/cadastro.css">

</head>

<body>

<main class="login">

    <button
        class="voltar"
        id="voltar">

        <span class="material-symbols-outlined"> arrow_back </span>

    </button>

    <h1>Cadastro</h1>

    <form
        class="login-form"
        autocomplete="off">

        <div class="campo">

            <label for="nome">

                NOME

            </label>
                

            <input
                id="nome"
                type="text"
                placeholder="Digite apenas seu primeiro nome">

        </div>

        <div class="campo">

            <label for="email">

                E-MAIL

            </label>
                

            <input
                id="email"
                type="email"
                placeholder="Digite seu e-mail">

        </div>

        <div class="campo">

            <label for="senha">

                SENHA

            </label>

            <div class="campo-senha">

                <input
                    id="senha"
                    type="password"
                    placeholder="Digite sua senha">

                <button
                    type="button"
                    id="mostrarSenha">

                    <span 
                    id="iconeSenha"
                    class="material-symbols-outlined"> visibility_off </span>

                </button>

            </div>

        </div>

        <button
            type="submit"
                class="btn btn-primario btn-login">

                CRIAR

        </button>

    </form>
</main>

<script src="../js/transition.js"></script>
<script src="../js/cadastro.js"></script>

</body>

</html>
