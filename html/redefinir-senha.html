<!DOCTYPE html>

<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0, viewport-fit=cover">

    <title>Pluvion</title>

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"/>

    <link rel="stylesheet" href="../reset.css">

    <link rel="stylesheet" href="../css/paleta.css">
    <link rel="stylesheet" href="../css/tipografias.css">
    <link rel="stylesheet" href="../css/componentes.css">
    <link rel="stylesheet" href="../css/animar.css">

    <link rel="stylesheet" href="../css/telas/redefinir-senha.css">

</head>

<body>

<main class="login">

    <section class="login-card">

        <button
            class="voltar"
            id="voltar">

            <span class="material-symbols-outlined"> arrow_back </span>

        </button>

        <h1>Redefinir Senha</h1>

        <p class="subtitulo">

            Digite o endereço de e-mail verificado da sua conta de usuário e lhe enviaremos um link para redefinir sua senha.
        </p>

        <form
            class="login-form"
            autocomplete="off">

            <div class="campo">

                <label for="email">

                    E-MAIL

                </label>
                

                <input
                    id="email"
                    type="email"
                    placeholder="Digite seu e-mail">

            </div>

            <button
                class="btn btn-primario btn-login">

                ENVIAR

            </button>

        </form>

    </section>

</main>

<script src="../js/redefinir-senha.js"></script>

</body>

</html>
